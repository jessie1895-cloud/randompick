<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리반 럭키 룰렛</title>
    <link rel="icon" href="data:,">
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans antialiased overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 아이콘 SVG 컴포넌트
        const IconTrophy = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
        );
        const IconSettings = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
        );
        const IconX = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        );
        const IconPlus = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M5 12h14"/><path d="M12 5v14"/></svg>
        );
        const IconRotateCcw = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        );
        const IconTrash2 = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
        );

        // 유틸리티: 랜덤 색상 생성
        const generateColors = (count) => {
            const colors = [];
            for (let i = 0; i < count; i++) {
                const hue = (i * 360) / count;
                colors.push(`hsl(${hue}, 70%, 60%)`);
            }
            return colors;
        };

        const DEFAULT_STUDENTS = [
            { id: '1', name: '김철수', active: true },
            { id: '2', name: '이영희', active: true },
            { id: '3', name: '박지성', active: true },
            { id: '4', name: '최동원', active: true },
            { id: '5', name: '안유진', active: true },
            { id: '6', name: '장원영', active: true },
        ];

        function App() {
            const [students, setStudents] = useState(() => {
                // 예외 처리 추가: 저장된 데이터가 손상되었을 경우 기본 명단으로 안전하게 복구
                try {
                    const saved = localStorage.getItem('roulette_students');
                    return saved ? JSON.parse(saved) : DEFAULT_STUDENTS;
                } catch (error) {
                    console.error("저장된 명단을 불러오는 중 오류 발생. 기본값으로 초기화합니다.");
                    return DEFAULT_STUDENTS;
                }
            });
            
            const [newStudentName, setNewStudentName] = useState('');
            const [isSpinning, setIsSpinning] = useState(false);
            const [rotation, setRotation] = useState(0);
            const [winner, setWinner] = useState(null);
            const [showSettings, setShowSettings] = useState(false);
            const [showWinnerModal, setShowWinnerModal] = useState(false);
            
            const spinTimeoutRef = useRef(null);

            useEffect(() => {
                localStorage.setItem('roulette_students', JSON.stringify(students));
            }, [students]);

            const activeStudents = students.filter(s => s.active);
            const colors = generateColors(activeStudents.length);

            const handleAddStudent = (e) => {
                e.preventDefault();
                if (!newStudentName.trim()) return;
                const newStudent = {
                    id: Date.now().toString(),
                    name: newStudentName.trim(),
                    active: true,
                };
                setStudents([...students, newStudent]);
                setNewStudentName('');
            };

            const handleToggleStudent = (id) => {
                setStudents(students.map(s => s.id === id ? { ...s, active: !s.active } : s));
            };

            const handleDeleteStudent = (id) => {
                setStudents(students.filter(s => s.id !== id));
            };

            const handleResetList = () => {
                if (window.confirm('모든 학생을 초기화하시겠습니까?')) {
                    setStudents(DEFAULT_STUDENTS);
                }
            };

            const handleSelectAll = () => {
                setStudents(students.map(s => ({ ...s, active: true })));
            };

            const spinRoulette = () => {
                if (activeStudents.length === 0) {
                    alert('추첨할 학생이 없습니다!');
                    return;
                }
                if (isSpinning) return;

                setIsSpinning(true);
                setWinner(null);
                setShowWinnerModal(false);

                const extraSpins = 5 * 360; 
                const randomDegree = Math.floor(Math.random() * 360);
                const totalRotation = rotation + extraSpins + randomDegree;
                
                setRotation(totalRotation);

                spinTimeoutRef.current = setTimeout(() => {
                    const finalDegree = totalRotation % 360;
                    const sliceAngle = 360 / activeStudents.length;
                    
                    let winningIndex = Math.floor((360 - (finalDegree % 360)) / sliceAngle);
                    if (winningIndex === activeStudents.length) winningIndex = 0;

                    setWinner(activeStudents[winningIndex]);
                    setShowWinnerModal(true);
                    setIsSpinning(false);
                }, 5000);
            };

            const handleExcludeWinner = () => {
                if (winner) {
                    handleToggleStudent(winner.id);
                    setShowWinnerModal(false);
                }
            };

            const createPieSlices = () => {
                const total = activeStudents.length;
                if (total === 0) return null;
                if (total === 1) {
                    return (
                        <g>
                            <circle cx="50" cy="50" r="50" fill={colors[0]} />
                            <text x="50" y="55" fontSize="10" textAnchor="middle" fill="#fff" fontWeight="bold">
                                {activeStudents[0].name}
                            </text>
                        </g>
                    );
                }

                let cumulativeAngle = 0;
                return activeStudents.map((student, index) => {
                    const sliceAngle = 360 / total;
                    const startAngle = cumulativeAngle;
                    const endAngle = cumulativeAngle + sliceAngle;
                    cumulativeAngle += sliceAngle;

                    const x1 = 50 + 50 * Math.cos((Math.PI * startAngle) / 180);
                    const y1 = 50 + 50 * Math.sin((Math.PI * startAngle) / 180);
                    const x2 = 50 + 50 * Math.cos((Math.PI * endAngle) / 180);
                    const y2 = 50 + 50 * Math.sin((Math.PI * endAngle) / 180);
                    
                    const largeArcFlag = sliceAngle > 180 ? 1 : 0;
                    const pathData = [
                        `M 50 50`,
                        `L ${x1} ${y1}`,
                        `A 50 50 0 ${largeArcFlag} 1 ${x2} ${y2}`,
                        `Z`
                    ].join(' ');

                    const textAngle = startAngle + sliceAngle / 2;
                    const textX = 50 + 35 * Math.cos((Math.PI * textAngle) / 180);
                    const textY = 50 + 35 * Math.sin((Math.PI * textAngle) / 180);

                    const fontSize = total > 20 ? 3 : total > 10 ? 5 : 6;

                    return (
                        <g key={student.id}>
                            <path d={pathData} fill={colors[index]} stroke="#ffffff" strokeWidth="0.5" />
                            <text 
                                x={textX} 
                                y={textY} 
                                fill="#ffffff" 
                                fontSize={fontSize} 
                                fontWeight="bold"
                                textAnchor="middle"
                                transform={`rotate(${textAngle + 90}, ${textX}, ${textY})`}
                                style={{textShadow: '0px 1px 2px rgba(0,0,0,0.8)'}}
                            >
                                {student.name}
                            </text>
                        </g>
                    );
                });
            };

            return (
                <div className="min-h-screen flex">
                    <div className="flex-1 flex flex-col items-center justify-center relative p-8">
                        <div className="absolute top-8 left-8 flex items-center space-x-4">
                            <h1 className="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-orange-500 flex items-center">
                                <IconTrophy className="mr-3 w-10 h-10 text-yellow-400" />
                                우리반 럭키 룰렛
                            </h1>
                        </div>

                        <div className="absolute top-8 right-8">
                            <button 
                                onClick={() => setShowSettings(!showSettings)}
                                className="p-3 bg-slate-800 rounded-full hover:bg-slate-700 transition-colors shadow-lg"
                            >
                                <IconSettings className="w-8 h-8 text-slate-300" />
                            </button>
                        </div>

                        <div className="relative w-full max-w-2xl aspect-square mt-10">
                            <div className="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-4 z-20">
                                <div className="w-0 h-0 border-l-[20px] border-l-transparent border-r-[20px] border-r-transparent border-t-[40px] border-t-red-500 drop-shadow-xl" />
                            </div>

                            <div 
                                className="w-full h-full rounded-full shadow-2xl overflow-hidden border-8 border-slate-700 bg-slate-800"
                                style={{
                                    transform: `rotate(${rotation}deg)`,
                                    transition: isSpinning ? 'transform 5s cubic-bezier(0.25, 0.1, 0.15, 1)' : 'none'
                                }}
                            >
                                <svg viewBox="0 0 100 100" className="w-full h-full transform -rotate-90">
                                    {createPieSlices()}
                                    <circle cx="50" cy="50" r="15" fill="#1e293b" />
                                    <circle cx="50" cy="50" r="10" fill="#334155" />
                                </svg>
                            </div>
                        </div>

                        <div className="mt-12 text-center z-10">
                            <button
                                onClick={spinRoulette}
                                disabled={isSpinning || activeStudents.length === 0}
                                className={`
                                    px-16 py-6 rounded-full text-3xl font-black tracking-widest uppercase transition-all shadow-[0_0_40px_rgba(234,179,8,0.3)]
                                    ${isSpinning 
                                        ? 'bg-slate-700 text-slate-400 cursor-not-allowed' 
                                        : 'bg-gradient-to-b from-yellow-400 to-orange-500 text-slate-900 hover:scale-105 active:scale-95 cursor-pointer'}
                                `}
                            >
                                {isSpinning ? '추첨 중...' : '돌리기!'}
                            </button>
                            <p className="mt-4 text-slate-400 text-lg">
                                참여 인원: <strong className="text-yellow-400">{activeStudents.length}</strong>명
                            </p>
                        </div>
                    </div>

                    <div className={`
                        fixed right-0 top-0 w-96 h-full bg-slate-800 shadow-2xl transform transition-transform duration-300 ease-in-out flex flex-col z-30
                        ${showSettings ? 'translate-x-0' : 'translate-x-full'}
                    `}>
                        <div className="p-6 border-b border-slate-700 flex justify-between items-center bg-slate-900">
                            <h2 className="text-2xl font-bold flex items-center">
                                <IconSettings className="w-6 h-6 mr-2 text-blue-400" />
                                명단 관리
                            </h2>
                            <button onClick={() => setShowSettings(false)} className="p-2 hover:bg-slate-700 rounded-full">
                                <IconX className="w-6 h-6" />
                            </button>
                        </div>

                        <div className="p-6 flex-1 overflow-y-auto">
                            <form onSubmit={handleAddStudent} className="flex mb-6">
                                <input
                                    type="text"
                                    value={newStudentName}
                                    onChange={(e) => setNewStudentName(e.target.value)}
                                    placeholder="학생 이름 입력"
                                    className="flex-1 bg-slate-700 text-white px-4 py-3 rounded-l-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                />
                                <button type="submit" className="bg-blue-600 hover:bg-blue-700 px-4 py-3 rounded-r-lg font-bold flex items-center">
                                    <IconPlus className="w-5 h-5" />
                                </button>
                            </form>

                            <div className="flex justify-between mb-4 space-x-2">
                                <button onClick={handleSelectAll} className="flex-1 py-2 text-sm bg-slate-700 hover:bg-slate-600 rounded text-center">
                                    전체 선택
                                </button>
                                <button onClick={handleResetList} className="flex-1 py-2 text-sm bg-red-900/50 hover:bg-red-900/80 text-red-300 rounded flex items-center justify-center">
                                    <IconRotateCcw className="w-4 h-4 mr-1" /> 초기화
                                </button>
                            </div>

                            <ul className="space-y-2">
                                {students.map((student) => (
                                    <li key={student.id} className={`flex items-center justify-between p-3 rounded-lg border ${student.active ? 'bg-slate-700/50 border-slate-600' : 'bg-slate-800/50 border-slate-700 opacity-50'}`}>
                                        <div className="flex items-center flex-1 cursor-pointer" onClick={() => handleToggleStudent(student.id)}>
                                            <input
                                                type="checkbox"
                                                checked={student.active}
                                                onChange={() => {}}
                                                className="w-5 h-5 mr-3 rounded border-slate-500 text-blue-600 focus:ring-blue-500 bg-slate-700"
                                            />
                                            <span className={`text-lg ${student.active ? 'text-white' : 'text-slate-500 line-through'}`}>
                                                {student.name}
                                            </span>
                                        </div>
                                        <button
                                            onClick={() => handleDeleteStudent(student.id)}
                                            className="p-2 text-slate-400 hover:text-red-400 hover:bg-slate-600 rounded-lg transition-colors"
                                            title="삭제"
                                        >
                                            <IconTrash2 className="w-5 h-5" />
                                        </button>
                                    </li>
                                ))}
                            </ul>
                        </div>
                    </div>

                    {showWinnerModal && winner && (
                        <div className="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50">
                            <div className="bg-slate-800 p-12 rounded-3xl shadow-[0_0_100px_rgba(234,179,8,0.4)] text-center max-w-xl w-full border border-yellow-500/30 transform transition-all scale-100">
                                <IconTrophy className="w-24 h-24 mx-auto text-yellow-400 mb-6" />
                                <h3 className="text-3xl text-slate-300 font-bold mb-4">축하합니다! 당첨자는</h3>
                                <div className="text-7xl font-black text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-orange-500 mb-10 py-2">
                                    {winner.name}
                                </div>
                                
                                <div className="flex space-x-4 justify-center">
                                    <button 
                                        onClick={handleExcludeWinner}
                                        className="px-6 py-4 bg-red-500/20 text-red-400 hover:bg-red-500/30 border border-red-500/50 rounded-xl font-bold text-lg transition-colors flex-1"
                                    >
                                        이번 추첨에서 제외
                                    </button>
                                    <button 
                                        onClick={() => setShowWinnerModal(false)}
                                        className="px-6 py-4 bg-blue-600 hover:bg-blue-500 text-white rounded-xl font-bold text-lg transition-colors flex-1"
                                    >
                                        계속 포함하고 닫기
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
